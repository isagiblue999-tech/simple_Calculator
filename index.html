<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculator</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-container">
        
        <!-- MODULE: PRIMARY CALCULATOR -->
        <div id="module-primary" class="active-module">
            <div class="calc-display-container">
                <div class="calc-history" id="calc-history"></div>
                <div class="calc-display" id="calc-display">0</div>
            </div>
            
            <div class="calc-keypad">
                <button class="btn fn-btn" data-val="sin(">sin</button>
                <button class="btn fn-btn" data-val="cos(">cos</button>
                <button class="btn fn-btn" data-val="tan(">tan</button>
                <button class="btn action-btn" data-action="ce">CE</button>
                <button class="btn action-btn" data-action="clear">C</button>
                
                <button class="btn fn-btn" data-val="log(">log</button>
                <button class="btn fn-btn" data-val="ln(">ln</button>
                <button class="btn fn-btn" data-val="(">(</button>
                <button class="btn fn-btn" data-val=")">)</button>
                <button class="btn action-btn" data-action="delete">DEL</button>
                
                <button class="btn fn-btn" data-val="√(">√</button>
                <button class="btn fn-btn" data-val="^2">x²</button>
                <button class="btn fn-btn" data-val="^">xʸ</button>
                <button class="btn fn-btn" data-val="!">n!</button>
                <button class="btn op-btn" data-val="÷">÷</button>
                
                <button class="btn fn-btn" data-val="π">π</button>
                <button class="btn num-btn" data-val="7">7</button>
                <button class="btn num-btn" data-val="8">8</button>
                <button class="btn num-btn" data-val="9">9</button>
                <button class="btn op-btn" data-val="×">×</button>
                
                <button class="btn fn-btn" data-val="e">e</button>
                <button class="btn num-btn" data-val="4">4</button>
                <button class="btn num-btn" data-val="5">5</button>
                <button class="btn num-btn" data-val="6">6</button>
                <button class="btn op-btn" data-val="-">-</button>
                
                <button class="btn fn-btn empty"></button>
                <button class="btn num-btn" data-val="1">1</button>
                <button class="btn num-btn" data-val="2">2</button>
                <button class="btn num-btn" data-val="3">3</button>
                <button class="btn op-btn" data-val="+">+</button>
                
                <button class="btn fn-btn empty"></button>
                <button class="btn fn-btn" data-val="%">%</button>
                <button class="btn num-btn" data-val="0">0</button>
                <button class="btn num-btn" data-val=".">.</button>
                <button class="btn equals-btn" data-action="calculate">=</button>
            </div>
        </div>

        <!-- MODULE: SECONDARY SYSTEM -->
        <div id="module-secondary" class="hidden-module">
            <header class="sys-header">
                <button id="sys-exit" class="icon-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <h2 class="sys-title">SECRET GALLERY</h2>
                <div class="sys-actions">
                    <button id="sys-add" class="icon-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                    <input type="file" id="sys-input" multiple accept="image/*" style="display: none;">
                </div>
            </header>
            
            <div id="sys-grid" class="sys-grid"></div>
            
            <!-- OVERLAY WRAPPER (This was missing) -->
            <div id="sys-overlay" class="sys-overlay hidden-module">
                <div class="sys-overlay-header">
                    <button id="sys-overlay-close" class="premium-pill-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
                        <span>Back</span>
                    </button>
                    <button id="sys-overlay-delete" class="premium-pill-btn danger">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/></svg>
                    </button>
                </div>
                
                <div class="sys-overlay-content" id="sys-overlay-content"></div>
                
                <div class="sys-nav">
                    <button id="sys-prev" class="nav-btn">‹</button>
                    <button id="sys-next" class="nav-btn">›</button>
                </div>
            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
